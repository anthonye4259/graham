<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Graham</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #faf7f2;
        color: #171512;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        box-sizing: border-box;
        text-align: center;
        background: #faf7f2;
      }

      main {
        max-width: 360px;
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 36px;
        font-weight: 600;
      }

      p {
        margin: 0 0 24px;
        color: #6f685f;
        font-size: 17px;
        line-height: 1.5;
      }

      button {
        min-height: 50px;
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #ad7a45;
        color: #fff;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>graham.</h1>
      <p>Graham could not finish starting. Check your connection and try again.</p>
      <button type="button" onclick="location.reload()">Try Again</button>
    </main>
  </body>
</html>
